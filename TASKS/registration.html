<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        /* Navigation Bar */
        nav {
            background-color: #2c3e50;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
        }

        nav a:hover {
            color: #f39c12;
        }

        /* Form Container */
        .form-container {
            background-color: white;
            width: 90%;
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: left;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .radio-group,
        .checkbox-group {
            margin-top: 10px;
        }

        .radio-group input,
        .checkbox-group input {
            width: auto;
            margin-right: 5px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a252f;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="schedule.html">Schedule</a>
    <a href="registration.html">Registration</a>
    <a href="navigation.html">Navigation</a>
</nav>

<div class="form-container">
    <h2>Student Registration Form</h2>

    <form>
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="reg">Registration Number:</label>
        <input type="text" id="reg" name="registration" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <label for="course">Select Course:</label>
        <select id="course" name="course" required>
            <option value="">-- Select Course --</option>
            <option>Web Technologies</option>
            <option>Operating Systems</option>
            <option>Artificial Intelligence</option>
            <option>Data Science</option>
        </select>

        <label>Semester:</label>
        <div class="radio-group">
            <input type="radio" name="semester" value="1" required> 1st Semester<br>
            <input type="radio" name="semester" value="2"> 2nd Semester<br>
            <input type="radio" name="semester" value="3"> 3rd Semester<br>
            <input type="radio" name="semester" value="4"> 4th Semester
        </div>

        <div class="checkbox-group">
            <input type="checkbox" required>
            I agree to the Terms and Conditions
        </div>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
