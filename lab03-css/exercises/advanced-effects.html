<!DOCTYPE html>
<html>
<head>
<title>Advanced Effects Showcase</title>
<link rel="stylesheet" href="../styles/advanced.css">
</head>
<body>
<h1 class="gradient-text">Advanced CSS Effects</h1>
<div class="section">
  <h2>Custom Checkbox</h2>
  <label class="check-container">
    <input type="checkbox">
    <span class="checkmark"></span>
    Accept Terms
  </label>
</div>
<div class="section">
  <h2>Custom Radio Button</h2>
  <label class="radio-container">
    <input type="radio" name="course">
    <span class="radio-mark"></span>
    Web Technologies
  </label>
</div>
<div class="section">
  <h2>Loading Animation</h2>
  <div class="loader"></div>
</div>
<div class="section">
  <h2>Text Clipping</h2>
  <p class="clip-text">WEB DESIGN</p>
</div>
<div class="section">
  <h2>Complex Shadow</h2>
  <div class="shadow-box">Shadow Box</div>
</div>
</body>
</html>
